name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: x86_64-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            name: aarch64-linux-musl
            os: ubuntu-22.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            name: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            name: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            name: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            msi: true

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # ── Install musl toolchain (Linux) ──
      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # ── Build ──
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.gz (Unix) ──
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../piz-${{ matrix.name }}.tar.gz piz
          cd ../../..

      # ── Package: zip (Windows) ──
      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/piz.exe -DestinationPath piz-${{ matrix.name }}.zip

      # ── Package: MSI (Windows) ──
      - name: Install cargo-wix
        if: matrix.msi
        run: cargo install cargo-wix --version 0.3.9
      - name: Init WiX
        if: matrix.msi
        shell: pwsh
        run: |
          if (-not (Test-Path "wix/main.wxs")) {
            cargo wix init --force
          }
      - name: Build MSI
        if: matrix.msi
        run: cargo wix --no-build --nocapture --target ${{ matrix.target }}
      - name: Rename MSI
        if: matrix.msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem target/wix/*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "piz-${{ matrix.name }}.msi"

      # ── Upload ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piz-${{ matrix.name }}
          path: |
            piz-${{ matrix.name }}.tar.gz
            piz-${{ matrix.name }}.zip
            piz-${{ matrix.name }}.msi
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts for upload
        run: ls -lh piz-* 2>/dev/null || echo "No artifacts found"

      - name: Generate release notes from CHANGELOG
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          git fetch --force --tags
          PREV_TAG=$(git tag --sort=-version:refname | grep -Fvx "v${VERSION}" | head -n 1 || true)
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ["GITHUB_REF"].removeprefix("refs/tags/v")
          content = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"(?s)## \[{re.escape(version)}\] - .*?(?=\n## \[|\Z)"
          match = re.search(pattern, content)
          if not match:
              print(f"Failed to find changelog section for {version}", file=sys.stderr)
              sys.exit(1)

          body = f"# v{version}\n\n{match.group(0).strip()}\n"
          Path("release-notes.md").write_text(body, encoding="utf-8")
          PY

          if [ -n "${PREV_TAG}" ]; then
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...v${VERSION}" >> release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          body_path: release-notes.md
          files: |
            piz-*.tar.gz
            piz-*.zip
            piz-*.msi

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 and update formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          SHA_MACOS_ARM64=$(sha256sum piz-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_MACOS_X86=$(sha256sum piz-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum piz-aarch64-linux-musl.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X86=$(sha256sum piz-x86_64-linux-musl.tar.gz | cut -d' ' -f1)

          sed -e "s/\${VERSION}/$VERSION/g" \
              -e "s/\${SHA256_MACOS_ARM64}/$SHA_MACOS_ARM64/g" \
              -e "s/\${SHA256_MACOS_X86_64}/$SHA_MACOS_X86/g" \
              -e "s/\${SHA256_LINUX_ARM64}/$SHA_LINUX_ARM64/g" \
              -e "s/\${SHA256_LINUX_X86_64}/$SHA_LINUX_X86/g" \
              homebrew/piz.rb > piz-formula.rb

          cat piz-formula.rb

      - name: Push to Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/AriesOxO/homebrew-tap.git tap-repo
          mkdir -p tap-repo/Formula
          cp piz-formula.rb tap-repo/Formula/piz.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/piz.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "piz ${{ env.VERSION }}"
          git push
